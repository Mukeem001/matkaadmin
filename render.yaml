services:
  - type: web
    name: matka-api-server
    env: node
    plan: free
    buildCommand: "yarn install && yarn workspaces run build"
    startCommand: "cd artifacts/api-server && npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
