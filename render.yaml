services:
  - type: web
    name: matka-api-server
    env: node
    plan: free
    buildCommand: "yarn install --frozen-lockfile 2>/dev/null || yarn install && yarn workspace @workspace/api-server run build"
    startCommand: "cd artifacts/api-server && npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
