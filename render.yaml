services:
  - type: web
    name: matka-api-server
    env: node
    plan: free
    buildCommand: "yarn install && yarn workspace @workspace/api-server run build"
    startCommand: "node artifacts/api-server/build/src/index.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
